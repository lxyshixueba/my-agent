feature:
  short_name: travel-plan-detail

page:
  key: travel-plan-day-detail
  name: 逐日行程详情
  type: page
  route: /travel-plans/:id/day/:dayIndex

layout:
  regions:
    - key: sidebar
      position: left
      containers: [side-nav]
    - key: day-tabs
      position: top
      containers: [day-tab-bar]
    - key: date-display
      position: top-right
      containers: [date-info]
    - key: schedule
      position: main-top
      containers: [schedule-card]
    - key: content
      position: main
      containers:
        - attractions-card
        - accommodation-card
        - dining-card
        - transportation-card

containers:
  - key: side-nav
    type: nav
  - key: day-tab-bar
    type: tabs
  - key: date-info
    type: label
  - key: schedule-card
    type: card
  - key: attractions-card
    type: card
  - key: accommodation-card
    type: card
  - key: dining-card
    type: card
  - key: transportation-card
    type: card

components:

  side_nav:
    container: side-nav
    items:
      - key: overview
        label: 行程概览
        active: false
      - key: attractions
        label: 景点详情
        active: true
      - key: accommodation
        label: 住宿安排
        active: false
      - key: transportation
        label: 交通方案
        active: false

  day_tabs:
    container: day-tab-bar
    items:
      - key: day-1
        label: 第1天
      - key: day-2
        label: 第2天
      - key: day-3
        label: 第3天
      - key: day-4
        label: 第4天

  date_display:
    container: date-info
    format: YYYY-MM-DD
    example: 2025-11-10

  daily_schedule:
    container: schedule-card
    title: 每日行程
    time_slots:
      - key: morning_1
        time_range: 08:00-10:00
        activity: 前往景点A并游览
      - key: morning_2
        time_range: 10:30-12:00
        activity: 继续游览景点A
      - key: afternoon_1
        time_range: 13:00-15:00
        activity: 前往景点B游览
      - key: afternoon_2
        time_range: 14:00-16:00
        activity: 继续游览景点B

  attractions:
    container: attractions-card
    title: 景点详情
    items:
      - key: attraction-1
        fields:
          - key: name
            label: 名称
            type: text
            example: 北京故宫
          - key: image
            label: 图片
            type: image
          - key: play_duration
            label: 游玩时间
            type: text
            example: 2-3小时
          - key: description
            label: 描述
            type: text
          - key: tips
            label: 推荐
            type: text
          - key: features
            label: 景点特色
            type: text
      - key: attraction-2
        fields:
          - key: name
            label: 名称
            type: text
            example: 鸟巢-北京奥林匹克公园
          - key: image
            label: 图片
            type: image
          - key: play_duration
            label: 游玩时间
            type: text
            example: 1-2小时
          - key: description
            label: 描述
            type: text
          - key: tips
            label: 推荐
            type: text
          - key: features
            label: 景点特色
            type: text

  accommodation:
    container: accommodation-card
    title: 住宿安排
    fields:
      - key: hotel_name
        label: 酒店
        type: text
        example: 北京万豪酒店
      - key: room_type
        label: 房型
        type: text
        example: 豪华标准间
      - key: address
        label: 地址
        type: text
        example: 北京市朝阳区xxx路xxx号
      - key: check_in
        label: 入住
        type: text
        example: 2025-11-10
      - key: check_out
        label: 退房
        type: text
        example: 2025-11-12
      - key: amenities
        label: 设施
        type: text
        example: 免费WiFi、停车位、商务中心、健身房

  dining:
    container: dining-card
    title: 餐饮安排
    meals:
      - key: breakfast
        label: 早餐
        type: text
        example: 北京传统早餐 豆浆油条、煎饼果子等
      - key: lunch
        label: 午餐
        type: text
        example: 北京烤鸭 全聚德或便宜坊的招牌菜，推荐北京烤鸭
      - key: dinner
        label: 晚餐
        type: text
        example: 北京炸酱面 老北京炸酱面是经典的北京小吃

  transportation:
    container: transportation-card
    title: 交通安排
    items:
      - key: flight
        label: 航班
        type: text
        example: 北京首都机场 → 北京大兴机场
      - key: train
        label: 火车
        type: text
        example: 北京南站 → 北京西站

overlays:
  - key: travel-plan-edit-day
    type: drawer
    trigger:
      from: page
      action: edit_day_schedule
    title: 编辑当日行程

states:
  loading:
    enabled: true
    skeleton: true
  empty:
    message: 当日暂无行程安排
  error:
    message: 加载行程详情失败
    retry: true
